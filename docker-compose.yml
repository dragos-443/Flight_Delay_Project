name: ${PROJECT_NAME:-flight-delay-project}

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: ${PROJECT_NAME:-flight-delay-project}-namenode
    restart: unless-stopped
    ports:
      - "${DOCKER_BIND_ADDRESS:-127.0.0.1}:${HDFS_NAMENODE_WEB_PORT:-9870}:9870"
      - "${DOCKER_BIND_ADDRESS:-127.0.0.1}:${HDFS_NAMENODE_RPC_PORT:-8020}:8020"
    environment:
      CLUSTER_NAME: ${PROJECT_NAME:-flight-delay-project}
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HDFS_CONF_dfs_namenode_rpc-address: namenode:8020
      HDFS_CONF_dfs_permissions_enabled: "false"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    networks:
      - bigdata

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: ${PROJECT_NAME:-flight-delay-project}-datanode
    restart: unless-stopped
    depends_on:
      - namenode
    ports:
      - "${DOCKER_BIND_ADDRESS:-127.0.0.1}:${HDFS_DATANODE_WEB_PORT:-9864}:9864"
    environment:
      SERVICE_PRECONDITION: namenode:9870
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HDFS_CONF_dfs_permissions_enabled: "false"
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    networks:
      - bigdata

  hive-metastore-postgresql:
    image: bde2020/hive-metastore-postgresql:2.3.0
    container_name: ${PROJECT_NAME:-flight-delay-project}-hive-metastore-db
    restart: unless-stopped
    volumes:
      - hive_metastore_db:/var/lib/postgresql/data
    networks:
      - bigdata

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: ${PROJECT_NAME:-flight-delay-project}-hive-metastore
    restart: unless-stopped
    depends_on:
      - namenode
      - datanode
      - hive-metastore-postgresql
    environment:
      SERVICE_PRECONDITION: namenode:8020 datanode:9864 hive-metastore-postgresql:5432
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: jdbc:postgresql://hive-metastore-postgresql/metastore
      HIVE_SITE_CONF_hive_metastore_uris: thrift://hive-metastore:9083
      HIVE_SITE_CONF_hive_metastore_schema_verification: "false"
      HIVE_SITE_CONF_datanucleus_schema_autoCreateAll: "true"
    command: /opt/hive/bin/hive --service metastore
    ports:
      - "${DOCKER_BIND_ADDRESS:-127.0.0.1}:${HIVE_METASTORE_PORT:-9083}:9083"
    networks:
      - bigdata

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: ${PROJECT_NAME:-flight-delay-project}-hive-server
    restart: unless-stopped
    depends_on:
      - hive-metastore
    environment:
      SERVICE_PRECONDITION: hive-metastore:9083
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: jdbc:postgresql://hive-metastore-postgresql/metastore
      HIVE_SITE_CONF_hive_metastore_uris: thrift://hive-metastore:9083
    ports:
      - "${DOCKER_BIND_ADDRESS:-127.0.0.1}:${HIVE_PORT:-10000}:10000"
    networks:
      - bigdata

  spark-master:
    image: apache/spark:3.5.1
    container_name: ${PROJECT_NAME:-flight-delay-project}-spark-master
    restart: unless-stopped
    depends_on:
      - namenode
      - datanode
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "${DOCKER_BIND_ADDRESS:-127.0.0.1}:${SPARK_MASTER_PORT:-7077}:7077"
      - "${DOCKER_BIND_ADDRESS:-127.0.0.1}:${SPARK_MASTER_WEB_PORT:-8080}:8080"
    volumes:
      - ./src:/opt/project/src
      - ./scripts:/opt/project/scripts
      - ./outputs:/opt/project/outputs
    networks:
      - bigdata

  spark-worker:
    image: apache/spark:3.5.1
    container_name: ${PROJECT_NAME:-flight-delay-project}-spark-worker
    restart: unless-stopped
    depends_on:
      - spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
      - --cores
      - "${SPARK_WORKER_CORES:-2}"
      - --memory
      - "${SPARK_WORKER_MEMORY:-2G}"
    ports:
      - "${DOCKER_BIND_ADDRESS:-127.0.0.1}:${SPARK_WORKER_WEB_PORT:-8081}:8081"
    volumes:
      - ./src:/opt/project/src
      - ./scripts:/opt/project/scripts
      - ./outputs:/opt/project/outputs
    networks:
      - bigdata

volumes:
  hadoop_namenode:
  hadoop_datanode:
  hive_metastore_db:

networks:
  bigdata:
    name: ${PROJECT_NAME:-flight-delay-project}-network
